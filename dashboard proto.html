<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NTAG SW · Command Dashboard (Prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#04070f; --bg-1:#070d1a; --panel:#0c1830; --panel-2:#0a1426;
  --line:rgba(70,130,200,.18); --line-soft:rgba(70,130,200,.10);
  --ink:#e8f0fb; --ink-soft:#9fb3cd; --ink-faint:#5d72a0;
  --triton:#3da9fc; --triton-glow:rgba(61,169,252,.35);
  --zeus:#ffb74d; --poseidon:#8b7cf6;
  --good:#2ce6c0; --danger:#ff5470; --warn:#ffb74d;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg-0);color:var(--ink);font-family:'Sora',sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;padding:24px 16px 60px;
  background:radial-gradient(900px 500px at 85% -5%, rgba(61,169,252,.10), transparent 60%),
    radial-gradient(700px 500px at 0% 100%, rgba(139,124,246,.07), transparent 55%),var(--bg-0);}
.wrap{max-width:1140px;margin:0 auto}
.dash-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.dash-kicker{font-family:'Chakra Petch',monospace;letter-spacing:.42em;font-size:11px;color:var(--triton);text-transform:uppercase}
.dash-title{font-family:'Chakra Petch',monospace;font-weight:700;font-size:clamp(26px,5vw,40px);letter-spacing:.02em;line-height:1.02;text-transform:uppercase}
.dash-title span{color:var(--triton)}
.dash-meta{text-align:right;font-size:12px;color:var(--ink-soft);line-height:1.5}
.dash-meta b{color:var(--ink);font-weight:600}
.dash-pill{display:inline-flex;align-items:center;gap:7px;margin-top:6px;padding:5px 12px;border:1px solid var(--line);border-radius:30px;background:var(--panel-2);font-family:'Chakra Petch',monospace;font-size:11px;letter-spacing:.08em}
.dot{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 10px var(--good);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{50%{opacity:.4}}
.hr{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin:18px 0 22px}
.sec{margin:30px 0 14px;display:flex;align-items:center;gap:12px}
.sec-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:linear-gradient(145deg,rgba(61,169,252,.22),rgba(10,20,40,.6));border:1px solid var(--line)}
.sec-ic svg{width:17px;height:17px;stroke:var(--triton);fill:none;stroke-width:2}
.sec h2{font-family:'Chakra Petch',monospace;font-weight:600;letter-spacing:.16em;font-size:13px;text-transform:uppercase}
.sec .sub{font-size:11px;color:var(--ink-faint)}
.tabs{display:inline-flex;background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:4px;gap:3px;margin-left:auto}
.tab{font-family:'Chakra Petch',monospace;font-size:12px;letter-spacing:.06em;color:var(--ink-soft);background:none;border:0;padding:7px 15px;border-radius:8px;cursor:pointer;transition:.15s}
.tab.active{background:linear-gradient(160deg,rgba(61,169,252,.3),rgba(61,169,252,.12));color:var(--ink)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px}
.kpi{position:relative;overflow:hidden;background:linear-gradient(160deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:18px 17px}
.kpi::after{content:"";position:absolute;inset:0;background:radial-gradient(120px 60px at 100% 0%,var(--triton-glow),transparent 70%);opacity:.5;pointer-events:none}
.kpi .lab{font-family:'Chakra Petch',monospace;font-size:11px;letter-spacing:.14em;color:var(--ink-soft);text-transform:uppercase}
.kpi .big{font-family:'Chakra Petch',monospace;font-weight:700;font-size:34px;line-height:1.05;margin-top:8px}
.kpi .sub{font-size:11px;color:var(--ink-faint);margin-top:3px}
.kpi .tag{margin-top:9px;font-family:'Chakra Petch',monospace;font-size:12px;font-weight:600}
.kpi.good .tag{color:var(--good)} .kpi.bad .tag{color:var(--danger)}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.cols{grid-template-columns:1fr}}
.card{background:var(--panel-2);border:1px solid var(--line);border-radius:16px;padding:16px}
.card h3{font-family:'Chakra Petch',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:13px;display:flex;align-items:center;gap:8px}
.card h3 .pip{width:8px;height:8px;border-radius:2px}
.alert-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line-soft)}
.alert-row:last-child{border-bottom:0}
.alert-rank{width:20px;font-family:'Chakra Petch',monospace;font-size:13px;color:var(--ink-faint)}
.alert-name{flex:1;font-size:13px;font-family:'Chakra Petch',monospace;letter-spacing:.02em}
.alert-name small{display:block;color:var(--ink-faint);font-size:10px;letter-spacing:.06em}
.alert-gs{font-family:'Chakra Petch',monospace;font-weight:600;font-size:14px;min-width:46px;text-align:right}
.alert-ask{font-size:11px;color:var(--ink-soft);min-width:78px;text-align:right}
.alert-ask b{color:var(--warn);font-family:'Chakra Petch',monospace}
.mv{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft)}
.mv:last-child{border-bottom:0}
.mv-name{flex:1;font-size:13px;font-family:'Chakra Petch',monospace}
.mv-chg{font-family:'Chakra Petch',monospace;font-weight:600;font-size:13px}
.mv.up .mv-chg{color:var(--good)} .mv.down .mv-chg{color:var(--danger)}
.mv-spark{width:54px;height:18px}
.ms-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:12px}
.ms{position:relative;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:14px;padding:15px 14px;text-align:center;transition:transform .15s,border-color .15s}
.ms:hover{transform:translateY(-3px);border-color:var(--triton)}
.ms.ahead{border-color:rgba(44,230,192,.4)} .ms.behind{border-color:rgba(255,84,112,.34)}
.ms .ms-lab{font-family:'Chakra Petch',monospace;letter-spacing:.12em;font-size:12px;color:var(--ink-soft)}
.ms .ms-rate{font-family:'Chakra Petch',monospace;font-weight:700;font-size:28px;margin:6px 0 1px}
.ms .ms-unit{font-size:12px;color:var(--ink-faint);font-weight:400}
.ms .ms-vs{font-size:11px;color:var(--ink-faint)}
.ms .ms-flag{margin-top:7px;font-family:'Chakra Petch',monospace;font-size:12.5px;font-weight:600}
.ms.ahead .ms-flag{color:var(--good)} .ms.behind .ms-flag{color:var(--danger)}
.ms .ms-bar{margin-top:10px;height:5px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden}
.ms .ms-fill{height:100%;border-radius:4px}
.tier-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:13px}
.tier{border-radius:16px;padding:17px;background:var(--panel-2);border:1px solid var(--line)}
.tier .tn{font-family:'Chakra Petch',monospace;letter-spacing:.1em;font-size:12px;text-transform:uppercase}
.tier .tc{font-family:'Chakra Petch',monospace;font-weight:700;font-size:30px;margin-top:7px}
.tier .td{font-size:11px;color:var(--ink-faint);margin-top:2px}
.tier.zeus{border-color:rgba(255,183,77,.5)} .tier.zeus .tn{color:var(--zeus)}
.tier.poseidon{border-color:rgba(139,124,246,.5)} .tier.poseidon .tn{color:var(--poseidon)}
.tier.triton{border-color:rgba(61,169,252,.5)} .tier.triton .tn{color:var(--triton)}
.tier.below{border-color:rgba(255,84,112,.4)} .tier.below .tn{color:var(--danger)}
svg.trend{width:100%;height:200px;display:block}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-family:'Chakra Petch',monospace;font-weight:500;letter-spacing:.08em;font-size:11px;text-transform:uppercase;color:var(--ink-soft);text-align:right;padding:9px 10px;border-bottom:1px solid var(--line)}
.tbl th:first-child{text-align:left}
.tbl td{padding:10px;border-bottom:1px solid var(--line-soft);text-align:right;font-variant-numeric:tabular-nums}
.tbl td:first-child{text-align:left;font-family:'Chakra Petch',monospace;letter-spacing:.04em}
.tbl tr:hover td{background:rgba(61,169,252,.05)}
.gs-chip{display:inline-block;min-width:54px;padding:3px 9px;border-radius:20px;font-family:'Chakra Petch',monospace;font-size:12px;font-weight:600}
.gs-z{background:rgba(255,183,77,.16);color:var(--zeus)} .gs-p{background:rgba(139,124,246,.16);color:var(--poseidon)}
.gs-t{background:rgba(61,169,252,.16);color:var(--triton)} .gs-b{background:rgba(255,84,112,.14);color:var(--danger)}
/* forecaster */
.fc-wrap{background:var(--panel-2);border:1px solid var(--line);border-radius:16px;padding:18px}
.fc-sets{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.fc-set{font-family:'Chakra Petch',monospace;font-size:12px;letter-spacing:.06em;color:var(--ink-soft);background:var(--panel);border:1px solid var(--line);padding:7px 14px;border-radius:9px;cursor:pointer;transition:.15s}
.fc-set.active{background:linear-gradient(160deg,rgba(61,169,252,.3),rgba(61,169,252,.12));color:var(--ink);border-color:var(--triton)}
.fc-set.behind::after{content:" ▼";color:var(--danger);font-size:10px}
.fc-set.ahead::after{content:" ▲";color:var(--good);font-size:10px}
.fc-body{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:760px){.fc-body{grid-template-columns:1fr}}
.fc-readout{display:flex;flex-direction:column;justify-content:center}
.fc-verdict{font-family:'Chakra Petch',monospace;font-weight:700;font-size:22px;line-height:1.2;margin-bottom:6px}
.fc-verdict.good{color:var(--good)} .fc-verdict.bad{color:var(--danger)} .fc-verdict.warn{color:var(--warn)}
.fc-detail{font-size:13px;color:var(--ink-soft);line-height:1.6}
.fc-detail b{color:var(--ink);font-family:'Chakra Petch',monospace}
.fc-slider-wrap{margin-top:18px}
.fc-slider-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.fc-slider-lab{font-family:'Chakra Petch',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}
.fc-slider-val{font-family:'Chakra Petch',monospace;font-weight:700;font-size:18px;color:var(--triton)}
.fc-slider-val small{font-size:11px;color:var(--ink-faint);font-weight:400}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:5px;background:linear-gradient(90deg,var(--triton) 0%,var(--triton) 50%,var(--line) 50%);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--triton);cursor:pointer;box-shadow:0 0 10px var(--triton-glow);border:2px solid var(--bg-0)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--triton);cursor:pointer;border:2px solid var(--bg-0)}
.fc-presets{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.fc-preset{font-family:'Chakra Petch',monospace;font-size:10.5px;letter-spacing:.04em;color:var(--ink-soft);background:var(--panel);border:1px solid var(--line-soft);padding:5px 10px;border-radius:7px;cursor:pointer}
.fc-preset:hover{border-color:var(--triton);color:var(--ink)}
svg.fc-chart{width:100%;height:190px;display:block}
.proto-badge{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:50;font-family:'Chakra Petch',monospace;font-size:10px;letter-spacing:.2em;color:var(--zeus);background:rgba(255,183,77,.1);border:1px solid rgba(255,183,77,.4);padding:4px 14px;border-radius:20px;text-transform:uppercase}
.loading,.errbox{text-align:center;padding:50px 20px;color:var(--ink-soft);font-family:'Chakra Petch',monospace;letter-spacing:.1em}
.errbox{color:var(--danger)}
.fade{animation:fade .5s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}}
.src-row{margin-top:24px;display:flex;gap:8px;align-items:center;font-size:11px;color:var(--ink-faint)}
.src-row input{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 10px;font-family:'Chakra Petch',monospace;font-size:11px}
.src-row button{background:var(--triton);color:var(--bg-0);border:0;border-radius:8px;padding:7px 14px;font-family:'Chakra Petch',monospace;font-size:11px;font-weight:600;cursor:pointer}
</style>
</head>

function prodDayIndex(iso){if(FY26_PROD_DAYS[iso]!==undefined)return FY26_PROD_DAYS[iso];const k=Object.keys(FY26_PROD_DAYS).sort();let b=null;for(const x of k){if(x<=iso)b=FY26_PROD_DAYS[x];else break;}return b;}
const PROD_DAYS_YEAR=233;
const MISSION_SETS=[
  {key:'alnav',label:'ALNAV',goal:3166,field:s=>s.attn},
  {key:'ac',label:'AC',goal:3101,field:s=>(s.ac&&s.ac.attn)||0},
  {key:'nso',label:'NSO',goal:169,field:s=>(s.nso&&s.nso.attn)||0},
  {key:'nf',label:'NF',goal:204,field:s=>(s.nuke&&s.nuke.attn)||0},
  {key:'nns',label:'NNS',goal:203,field:s=>(s.nns&&s.nns.attn)||0},
];
const sum=(snap,f)=>snap.stations.reduce((a,s)=>a+(f(s)||0),0);
const fmt=n=>Math.round(n).toLocaleString();
const tierOf=gs=>gs>=1.4?'zeus':gs>=1.2?'poseidon':gs>=1.0?'triton':'below';
var CURRENT_URL='data.json', BUNDLE=null;

async function load(url){
  CURRENT_URL=url;
  const root=document.getElementById('root');
  root.innerHTML='<div class="loading">LOADING COMMAND DATA…</div>';
  try{
    const res=await fetch(url,{cache:'no-store'}); if(!res.ok)throw new Error('HTTP '+res.status);
    BUNDLE=await res.json(); render();
  }catch(e){
    root.innerHTML='<div class="errbox">COULD NOT LOAD data.json<br><br>'+e.message+'</div>'+srcRow();
    wireSrc();
  }
}
function srcRow(){return '<div class="src-row"><span>Source:</span><input id="srcUrl" value="'+CURRENT_URL+'"><button id="srcGo">Reload</button></div>';}
function wireSrc(){const g=document.getElementById('srcGo'); if(g)g.onclick=()=>load(document.getElementById('srcUrl').value.trim());}

function velocity(snaps,target){
  const d=snaps.map(s=>({s,idx:prodDayIndex(s.date)})).filter(o=>o.idx!=null);
  if(d.length<2)return null; d.sort((a,b)=>a.idx-b.idx);
  const cur=d[d.length-1];
  for(let i=d.length-2;i>=0;i--){if(cur.idx-d[i].idx>=target)return{cur:cur.s,past:d[i].s,span:cur.idx-d[i].idx};}
  return null;
}

function render(){
  const snaps=[...BUNDLE.snapshots].filter(s=>s.stations&&s.stations.length)
    .map(s=>({...s,idx:prodDayIndex(s.date)})).sort((a,b)=>(a.idx??-1)-(b.idx??-1));
  const cur=snaps[snaps.length-1], prev=snaps[snaps.length-2]||cur, curIdx=prodDayIndex(cur.date);
  const frac=curIdx/PROD_DAYS_YEAR, daysLeft=PROD_DAYS_YEAR-curIdx;

  H.push(kpi('ALNAV Attained',fmt(totAttn),'of '+fmt(totGoal)+' · '+Math.round(totAttn/totGoal*100)+'% of goal',totAttn>=reqToDate?'good':'bad',(totAttn>=reqToDate?'▲ +':'▼ ')+fmt(totAttn-reqToDate)+' vs req'));
  H.push(kpi('Projected EOY',fmt(projEOY),'at current pace · goal '+fmt(totGoal),projEOY>=totGoal?'good':'bad',(projEOY>=totGoal?'▲ +':'▼ ')+fmt(projEOY-totGoal)));
  const v10=velocity(snaps,10); const av=v10?(sum(v10.cur,x=>x.attn)-sum(v10.past,x=>x.attn))/v10.span:null;
  H.push(kpi('ALNAV Velocity',av!=null?av.toFixed(1):'N/A','contracts/day · 10 PD',av!=null&&av>=3166/233?'good':'bad',av!=null?((av>=3166/233?'▲ ':'▼ ')+'vs '+(3166/233).toFixed(1)+' req'):'add history'));
  H.push('</div>');

  // ACTION ROW: needs attention + movers
  H.push(secHead('alert','Command Focus','Where to direct effort right now',''));
  H.push('<div class="cols fade">');
  // needs attention
  const below=cur.stations.map(s=>{

  let na='<div class="card"><h3><span class="pip" style="background:var(--danger)"></span>Needs Attention · Below Glideslope</h3>';
  if(!below.length) na+='<div style="color:var(--good);font-size:13px;font-family:Chakra Petch,monospace">All stations at or above glideslope. ▲</div>';
  below.forEach((s,i)=>{na+='<div class="alert-row"><div class="alert-rank">'+(i+1)+'</div>'+
    '<div class="alert-name">'+s.name+'<small>'+s.div+'</small></div>'+
    '<div class="alert-gs" style="color:var(--danger)">'+(s.gs*100).toFixed(0)+'%</div>'+
    '<div class="alert-ask">need <b>'+s.needPerDay.toFixed(2)+'</b>/day</div></div>';});
  na+='</div>'; H.push(na);
  // movers

  top.forEach(m=>{mv+='<div class="mv up"><div class="mv-name">'+m.name+'</div><div class="mv-chg">▲ +'+(m.chg*100).toFixed(1)+'%</div></div>';});
  mv+='<div style="height:8px"></div>';
  bot.forEach(m=>{mv+='<div class="mv down"><div class="mv-name">'+m.name+'</div><div class="mv-chg">▼ '+(m.chg*100).toFixed(1)+'%</div></div>';});
  mv+='</div>'; H.push(mv);
  H.push('</div>');

  // velocity
  H.push(secHead('activity','Command Velocity','Moving-average pace per mission set','<div class="tabs"><button class="tab active" data-w="10">10-Day</button><button class="tab" data-w="30">30-Day</button></div>'));
  H.push('<div id="velWrap" class="fade"></div>');

  H.push('<div class="ms-grid fade">'+MISSION_SETS.map(ms=>{

    return '<div class="ms '+(ahead?'ahead':'behind')+'"><div class="ms-lab">'+ms.label+'</div>'+

  }).join('')+'</div>');

  // FORECASTER
  H.push(secHead('forecast','Reattainment Forecaster','Project when a behind set returns to 100% glideslope',''));
  H.push('<div class="fc-wrap fade" id="fcWrap"></div>');
  H.push(secHead('layers','Glideslope Posture','Stations by ALNAV tier',''));
  const tc={zeus:0,poseidon:0,triton:0,below:0}; cur.stations.forEach(s=>tc[tierOf(s.glideslope_pct)]++);
  H.push('<div class="tier-grid fade">'+tierCard('zeus','Zeus','≥140%',tc.zeus)+tierCard('poseidon','Poseidon','≥120%',tc.poseidon)+

  const divs={}; cur.stations.forEach(s=>{const d=s.division||'—'; (divs[d]=divs[d]||{goal:0,attn:0}); divs[d].goal+=s.goal||0; divs[d].attn+=s.attn||0;});

  Object.keys(divs).sort().forEach(d=>{const o=divs[d];const pct=o.goal?o.attn/o.goal:0;const gs=o.goal?o.attn/(o.goal*frac):0;const t=tierOf(gs);

  tb+='</tbody></table></div>'; H.push(tb);

  H.push(srcRow());
  document.getElementById('root').innerHTML=H.join('');

  function renderVel(target){

    }).join('')+'</div><div class="sec" style="margin:12px 0 0"><div class="sub">'+v.span+'-production-day average'+(v.span===target?'':' (nearest ≥'+target+')')+' · '+v.cur.label+' vs '+v.past.label+'</div></div>';
  }
  renderVel(10);
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');renderVel(+t.dataset.w);});
  wireSrc();

  /* ---------- FORECASTER ---------- */
  // current velocity per set over last 10 PD (fallback 30)

  function setVelocityWin(ms,target){

  }
  let fcKey = (function(){

  function drawForecaster(){

    const attn=sum(cur,ms.field);

    const curVel=Math.max(0,setVelocity(ms));
    const reqRate=goal/PROD_DAYS_YEAR;                 // contracts/day to stay exactly on glideslope

    const behind=attn<reqNow;

    if(fcRate===null) fcRate=Math.round(curVel*100)/100;

    let reattainPD=null;   // for behind sets: when we climb back to the line

      }

    }

      else { const dt=pdToDate(reattainPD); vClass=reattainPD<=PROD_DAYS_YEAR?'warn':'bad';

        vText='Reattain by PD '+reattainPD; }

      else if(fallPD==='after-eoy'){ vClass='good'; vText='Holds through FY26'; detail='Even at <b>'+rate.toFixed(2)+'/day</b>, the current cushion (<b>+'+fmt(attn-reqNow)+'</b>) carries '+ms.label+' above glideslope through the end of the fiscal year.'; }

      else { vClass='good'; vText='On glideslope'; detail=ms.label+' is at <b>'+(attn/(goal*frac)*100).toFixed(0)+'%</b> of pace with a <b>+'+fmt(attn-reqNow)+'</b> cushion.'; }
    }

            '<input type="range" id="fcSlider" min="0" max="'+maxRate.toFixed(2)+'" step="0.05" value="'+rate+'">'+
            '<div class="fc-presets">'+
              (function(){

                  ? '<span class="fc-preset" data-r="'+(reqRate*1.25).toFixed(2)+'">+25%</span><span class="fc-preset" data-r="'+(reqRate*1.5).toFixed(2)+'">+50%</span>'

  function setTabs(){

var fcRate=null;
function pdToDate(pd){ const e=Object.entries(FY26_PROD_DAYS).find(([d,i])=>i===pd); if(!e) return null;
  const dt=new Date(e[0]+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fcChart(goal,attn,curIdx,rate,crossPD,behind){
  const W=1000,Hh=190,pl=10,pr=10,pt=12,pb=22;
  const reqRate=goal/PROD_DAYS_YEAR;
  const xmin=Math.max(0,curIdx-20), xmax=PROD_DAYS_YEAR;
  const yAt=d=>attn+(d-curIdx)*rate;       // projected
  const rAt=d=>goal*(d/PROD_DAYS_YEAR);    // required
  const ymax=Math.max(rAt(xmax),yAt(xmax),goal)*1.05;
  const X=x=>pl+((x-xmin)/(xmax-xmin))*(W-pl-pr), Y=y=>pt+(1-y/ymax)*(Hh-pt-pb);
  const proj='M'+X(curIdx)+' '+Y(attn)+' L'+X(xmax)+' '+Y(yAt(xmax));
  const req='M'+X(xmin)+' '+Y(rAt(xmin))+' L'+X(xmax)+' '+Y(rAt(xmax));
  const mColor=behind?'var(--good)':'var(--danger)';
  let marker='';
  if(typeof crossPD==='number'){ marker='<line x1="'+X(crossPD)+'" y1="'+pt+'" x2="'+X(crossPD)+'" y2="'+(Hh-pb)+'" stroke="'+mColor+'" stroke-width="1.5" stroke-dasharray="3 3"/>'+
    '<circle cx="'+X(crossPD)+'" cy="'+Y(rAt(crossPD))+'" r="4" fill="'+mColor+'"/>'; }
  const crossLabel=behind?'<span style="color:var(--good)">| Reattain</span>':'<span style="color:var(--danger)">| Slip below</span>';
  return '<svg class="fc-chart" viewBox="0 0 '+W+' '+Hh+'" preserveAspectRatio="none">'+
    marker+
    '<path d="'+req+'" stroke="rgba(255,183,77,.8)" stroke-width="1.5" stroke-dasharray="5 5" fill="none"/>'+
    '<path d="'+proj+'" stroke="var(--triton)" stroke-width="2.5" fill="none"/>'+
    '<circle cx="'+X(curIdx)+'" cy="'+Y(attn)+'" r="3.5" fill="var(--triton)"/>'+
    '</svg>'+
    '<div style="display:flex;gap:16px;justify-content:center;margin-top:6px;font-size:11px;color:var(--ink-faint);font-family:Chakra Petch,monospace"><span style="color:var(--triton)">— Projected</span><span style="color:var(--zeus)">- - Required (100% GS)</span>'+crossLabel+'</div>';
}
function kpi(lab,big,sub,cls,tag){return '<div class="kpi '+(cls||'')+'"><div class="lab">'+lab+'</div><div class="big">'+big+'</div><div class="sub">'+sub+'</div>'+(tag?'<div class="tag">'+tag+'</div>':'')+'</div>';}
function tierCard(cls,name,desc,count){return '<div class="tier '+cls+'"><div class="tn">'+name+'</div><div class="tc">'+count+'</div><div class="td">'+desc+' glideslope · stations</div></div>';}
function secHead(icon,title,sub,right){const I={alert:'<path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/>',activity:'<polyline points="3 12 7 12 10 4 14 20 17 12 21 12"/>',layers:'<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/>',trend:'<polyline points="3 17 9 11 13 15 21 6"/><polyline points="14 6 21 6 21 13"/>',grid:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>',target:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/>',forecast:'<path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/><circle cx="19" cy="7" r="1.5" fill="currentColor"/>'};
  return '<div class="sec"><div class="sec-ic"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">'+I[icon]+'</svg></div><div><h2>'+title+'</h2><div class="sub">'+sub+'</div></div>'+(right||'')+'</div>';}
function trendSvg(snaps){const pts=snaps.filter(s=>s.idx!=null).map(s=>({x:s.idx,y:s.stations.reduce((a,t)=>a+(t.attn||0),0)}));
  if(pts.length<2)return '<div class="errbox">Not enough data.</div>';
  const W=1000,H=200,pl=8,pr=8,pt=14,pb=8;const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
  const xmin=Math.min(...xs),xmax=Math.max(...xs),ymax=Math.max(...ys)*1.08;
  const X=x=>pl+((x-xmin)/(xmax-xmin||1))*(W-pl-pr),Y=y=>pt+(1-y/ymax)*(H-pt-pb);
  const totGoal=snaps[snaps.length-1].stations.reduce((a,s)=>a+(s.goal||0),0);
  const reqAt=x=>totGoal*(x/PROD_DAYS_YEAR);
  const line=pts.map((p,i)=>(i?'L':'M')+X(p.x).toFixed(1)+' '+Y(p.y).toFixed(1)).join(' ');
  const area=line+' L'+X(xmax)+' '+Y(0)+' L'+X(xmin)+' '+Y(0)+' Z';
  return '<svg class="trend" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(61,169,252,.35)"/><stop offset="1" stop-color="rgba(61,169,252,0)"/></linearGradient></defs>'+
    '<path d="'+area+'" fill="url(#g)"/><path d="M'+X(xmin)+' '+Y(reqAt(xmin))+' L'+X(xmax)+' '+Y(reqAt(xmax))+'" stroke="rgba(255,183,77,.7)" stroke-width="1.5" stroke-dasharray="5 5" fill="none"/>'+
    '<path d="'+line+'" stroke="var(--triton)" stroke-width="2.5" fill="none"/>'+pts.map(p=>'<circle cx="'+X(p.x).toFixed(1)+'" cy="'+Y(p.y).toFixed(1)+'" r="3" fill="var(--triton)"/>').join('')+'</svg>'+
    '<div style="display:flex;gap:18px;justify-content:center;margin:8px 0 2px;font-size:11px;color:var(--ink-faint);font-family:Chakra Petch,monospace"><span style="color:var(--triton)">— Actual</span><span style="color:var(--zeus)">- - Required pace</span></div>';}
load(CURRENT_URL);
</script>
